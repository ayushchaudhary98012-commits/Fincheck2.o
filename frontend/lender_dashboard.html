<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrust | Lender Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="static/css/styles.css">
    <script>
        (function() {
            const storedTheme = localStorage.getItem('fintrust_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', storedTheme);
        })();
    </script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i class="fas fa-shield-halved"></i>
            <span>Fin</span> Trust
        </a>
        <ul class="nav-menu">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="lender_dashboard.html" class="nav-link active">Lender Portal</a></li>
            <li><a href="agreements.html" class="nav-link">Agreements</a></li>
            <li><a href="verification.html" class="nav-link">Verify Trust</a></li>
        </ul>
        <div class="nav-actions">
            <button id="theme-toggle-btn" class="theme-toggle"><i class="fas fa-moon"></i></button>
            <div id="nav-auth-section"></div>
        </div>
    </nav>

    <main class="main-content" style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <div>
                <h1 style="font-size: 2.2rem; font-weight: 800; color: var(--text-primary);">Lender Dashboard</h1>
                <p style="color: var(--text-secondary);">Manage your lending preferences, view matched credit applications, and structure digital loan agreements.</p>
            </div>
        </div>

        <!-- Matched Borrower Queue -->
        <div class="glass-panel" style="padding: 30px; border-radius: 20px; margin-bottom: 40px;">
            <h3 style="font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; color: var(--text-primary);">Matched Borrower Credit Applications</h3>
            <div id="lender-matches-container">
                <p style="color: var(--text-muted);">Loading matched borrowers...</p>
            </div>
        </div>
    </main>

    <script src="static/js/config.js"></script>
    <script src="static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await apiFetch('/api/lender/dashboard/data');
                if (!res.ok) {
                    window.location.href = 'login.html';
                    return;
                }
                const data = await res.json();
                
                const matchesContainer = document.getElementById('lender-matches-container');
                if (data.matches.length === 0) {
                    matchesContainer.innerHTML = '<p style="color: var(--text-muted);">No borrower applications currently match your preferences.</p>';
                } else {
                    let html = `<div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">`;
                    data.matches.forEach(m => {
                        html += `<div class="glass-panel" style="padding: 24px; border-radius: 16px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                                <span style="font-weight: 700; font-size: 1.1rem; color: var(--text-primary);">${m.full_name}</span>
                                <span class="badge badge-approved">${m.compatibility_score}% Match</span>
                            </div>
                            <div style="font-size: 1.4rem; font-weight: 800; color: var(--primary); margin-bottom: 8px;">₹${Number(m.loan_amount).toLocaleString()}</div>
                            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px;">Tenure: ${m.loan_tenure} Months | Risk: ${m.risk_category || 'Low'}</p>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">Contact: ${m.borrower_email}</div>
                        </div>`;
                    });
                    html += `</div>`;
                    matchesContainer.innerHTML = html;
                }
            } catch (e) {
                console.error("Lender dashboard error:", e);
            }
        });
    </script>
</body>
</html>

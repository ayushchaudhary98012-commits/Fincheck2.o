<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrust | Admin Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="static/css/styles.css">
    <script>
        (function() {
            const storedTheme = localStorage.getItem('fintrust_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', storedTheme);
        })();
    </script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i class="fas fa-shield-halved"></i>
            <span>Fin</span> Trust
        </a>
        <ul class="nav-menu">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="admin_dashboard.html" class="nav-link active">Admin Portal</a></li>
        </ul>
        <div class="nav-actions">
            <button id="theme-toggle-btn" class="theme-toggle"><i class="fas fa-moon"></i></button>
            <div id="nav-auth-section"></div>
        </div>
    </nav>

    <main class="main-content" style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
        <div style="margin-bottom: 30px;">
            <h1 style="font-size: 2.2rem; font-weight: 800; color: var(--text-primary);">Lender / Admin Control Center</h1>
            <p style="color: var(--text-secondary);">Real-time monitoring of all credit requests, status overrides, and PDF report exports.</p>
        </div>

        <!-- Metrics Grid -->
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px;">
            <div class="glass-panel" style="padding: 24px; border-radius: 16px; text-align: center;">
                <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Total Applications</div>
                <div id="stat-total" style="font-size: 2.2rem; font-weight: 800; color: var(--primary); margin-top: 8px;">0</div>
            </div>
            <div class="glass-panel" style="padding: 24px; border-radius: 16px; text-align: center;">
                <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Approved</div>
                <div id="stat-approved" style="font-size: 2.2rem; font-weight: 800; color: var(--success); margin-top: 8px;">0</div>
            </div>
            <div class="glass-panel" style="padding: 24px; border-radius: 16px; text-align: center;">
                <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Pending Verification</div>
                <div id="stat-pending" style="font-size: 2.2rem; font-weight: 800; color: var(--warning); margin-top: 8px;">0</div>
            </div>
            <div class="glass-panel" style="padding: 24px; border-radius: 16px; text-align: center;">
                <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Rejected</div>
                <div id="stat-rejected" style="font-size: 2.2rem; font-weight: 800; color: var(--danger); margin-top: 8px;">0</div>
            </div>
        </div>

        <!-- All Applications Queue -->
        <div class="glass-panel" style="padding: 30px; border-radius: 20px;">
            <h3 style="font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; color: var(--text-primary);">Application Queue & PDF Download</h3>
            <div id="admin-table-container">
                <p style="color: var(--text-muted);">Loading system applications...</p>
            </div>
        </div>
    </main>

    <script src="static/js/config.js"></script>
    <script src="static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await apiFetch('/api/admin/dashboard/data');
                if (!res.ok) {
                    window.location.href = 'login.html';
                    return;
                }
                const data = await res.json();
                
                document.getElementById('stat-total').innerText = data.stats.total;
                document.getElementById('stat-approved').innerText = data.stats.approved;
                document.getElementById('stat-pending').innerText = data.stats.pending;
                document.getElementById('stat-rejected').innerText = data.stats.rejected;
                
                const tableContainer = document.getElementById('admin-table-container');
                if (data.applications.length === 0) {
                    tableContainer.innerHTML = '<p style="color: var(--text-muted);">No credit applications found.</p>';
                } else {
                    let html = `<table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--glass-border); color: var(--text-muted); font-size: 0.85rem;">
                                <th style="padding: 12px;">App ID</th>
                                <th style="padding: 12px;">Applicant Name</th>
                                <th style="padding: 12px;">Loan Amount</th>
                                <th style="padding: 12px;">Status</th>
                                <th style="padding: 12px;">Risk</th>
                                <th style="padding: 12px;">Export Report</th>
                            </tr>
                        </thead>
                        <tbody>`;
                    data.applications.forEach(a => {
                        html += `<tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <td style="padding: 12px; font-weight: 600;">#AP-${a.id}</td>
                            <td style="padding: 12px;">${a.full_name}</td>
                            <td style="padding: 12px; font-weight: 700; color: var(--primary);">₹${Number(a.loan_amount).toLocaleString()}</td>
                            <td style="padding: 12px;"><span class="badge ${a.status === 'Approved' ? 'badge-approved' : 'badge-pending'}">${a.status}</span></td>
                            <td style="padding: 12px;">${a.risk_category || 'Low'}</td>
                            <td style="padding: 12px;">
                                <a href="${API_BASE_URL}/api/applications/${a.id}/pdf" target="_blank" class="btn btn-secondary" style="padding: 4px 10px; font-size: 0.75rem;">
                                    <i class="fas fa-file-pdf"></i> Download PDF
                                </a>
                            </td>
                        </tr>`;
                    });
                    html += `</tbody></table>`;
                    tableContainer.innerHTML = html;
                }
            } catch (e) {
                console.error("Admin dashboard error:", e);
            }
        });
    </script>
</body>
</html>
